name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright (Windows)
    runs-on: windows-latest
    # Keep a tight cap - the packaging step + 20-odd Electron launches shouldn't
    # take longer than this, and a runaway test should fail fast.
    timeout-minutes: 45

    env:
      # launch.ts reads this. Keep the e2e build separate from the `out/` dir
      # the normal build uses so caching / artifact uploads don't collide.
      FORGE_OUT_DIR: out-e2e
      TMAX_E2E_OUT_DIR: out-e2e

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Package tmax for e2e
        run: npm run package

      - name: Run Playwright e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test-results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
